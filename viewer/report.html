<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob Council Report</title>
    <link rel="stylesheet" href="viewer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        .report-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }

        .report-title-section h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
        }

        .report-subtitle {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .report-pr-title {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .contentiousness-score {
            padding: 0.25rem 0.75rem;
            background: var(--bg-secondary);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .report-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-print {
            padding: 0.5rem 1rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-print:hover {
            opacity: 0.9;
        }

        .back-link {
            color: var(--accent-color);
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Markdown content styles */
        #verdictContent {
            max-width: 720px;
            margin: 0 auto;
            line-height: 1.6;
        }

        #verdictContent h2 {
            font-size: 1.5rem;
            margin: 2.5rem 0 1rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        #verdictContent h3 {
            font-size: 1.2rem;
            margin: 2rem 0 0.75rem 0;
            color: var(--text-primary);
        }

        #verdictContent p {
            margin: 1rem 0;
        }

        #verdictContent ul, #verdictContent ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        #verdictContent li {
            margin: 0.5rem 0;
        }

        #verdictContent code {
            background: var(--bg-secondary);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        #verdictContent pre {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        #verdictContent pre code {
            background: none;
            padding: 0;
            font-size: 0.9rem;
        }

        #verdictContent blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        #verdictContent strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        #verdictContent a {
            color: var(--accent-color);
            text-decoration: none;
        }

        #verdictContent a:hover {
            text-decoration: underline;
        }

        #verdictContent hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 2rem 0;
        }

        /* Severity pill styles */
        .severity-pill {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 0.5rem;
        }

        .severity-critical {
            background: #dc2626;
            color: white;
        }

        .severity-major {
            background: #ea580c;
            color: white;
        }

        .severity-minor {
            background: #ca8a04;
            color: white;
        }

        .severity-mild {
            background: #65a30d;
            color: white;
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                color: black;
            }

            .report-actions,
            .back-link,
            .btn-print {
                display: none !important;
            }

            .report-container {
                max-width: 100%;
                padding: 0;
            }

            #verdictContent {
                max-width: 100%;
            }

            pre {
                page-break-inside: avoid;
            }

            h1, h2, h3 {
                page-break-after: avoid;
            }

            .report-header {
                border-bottom: 2px solid #333;
            }

            #verdictContent pre {
                background: #f5f5f5;
                border: 1px solid #ddd;
            }

            #verdictContent blockquote {
                border-left-color: #666;
            }

            code, pre {
                font-family: 'Courier New', Courier, monospace;
            }

            .severity-critical {
                background: #dc2626 !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .severity-major {
                background: #ea580c !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .severity-minor {
                background: #ca8a04 !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .severity-mild {
                background: #65a30d !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <div class="report-container">
        <div class="report-header">
            <div class="report-title-section">
                <h1>Bob Council Report</h1>
                <div class="report-subtitle">
                    <span class="report-pr-title" id="prTitle">Loading...</span>
                    <span class="verdict-pill" id="finalVerdict">Loading...</span>
                </div>
            </div>
            <div class="report-actions">
                <a href="#" class="back-link" id="backLink">← Back to walkthrough</a>
                <button class="btn-print" onclick="window.print()">Print / Export PDF</button>
            </div>
        </div>

        <div id="verdictContent">
            Loading...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="report.js"></script>
</body>
</html>
